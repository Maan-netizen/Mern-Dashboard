kind = "slides"
previewPath = "/project-deck/"
title = "Command Center — Project Deck"
version = "1.0.0"
id = "artifacts/project-deck"
router = "path"

[[services]]
name = "web"
paths = [ "/project-deck/" ]
localPort = 24787

[services.development]
run = "pnpm --filter @workspace/project-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/project-deck", "run", "build" ]
serve = "static"
publicDir = "artifacts/project-deck/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24787"
BASE_PATH = "/project-deck/"
